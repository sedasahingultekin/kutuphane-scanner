<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Kütüphane Takip</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html, body{
      width:100%;
      max-width:100%;
      overflow-x:hidden;
      font-family:Arial,sans-serif;
      background:linear-gradient(180deg,#f7f7f7 0%,#ececec 100%);
      -webkit-text-size-adjust:100%;
      touch-action:manipulation;
    }

    body{
      padding:14px;
    }

    .app{
      width:100%;
      max-width:100vw;
      overflow-x:hidden;
      margin:0 auto;
    }

    .header{
      background:#F28400;
      color:white;
      padding:clamp(14px,4vw,22px);
      border-radius:20px;
      font-size:clamp(22px,6vw,30px);
      font-weight:bold;
      margin-bottom:14px;
      text-align:center;
      box-shadow:0 6px 14px rgba(0,0,0,0.15);
    }

    .subInfo{
      background:#fff;
      border-radius:14px;
      padding:12px 14px;
      margin-bottom:18px;
      text-align:left;
      font-size:clamp(13px,3.6vw,16px);
      line-height:1.5;
      color:#444;
      box-shadow:0 3px 10px rgba(0,0,0,0.06);
      word-break:break-word;
    }

    .grid{
      width:100%;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }

    .menuBtn{
      min-width:0;
      width:100%;
      aspect-ratio:1/1;
      border:none;
      border-radius:22px;
      background:white;
      color:#333;
      font-size:clamp(18px,4.8vw,24px);
      font-weight:bold;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      box-shadow:0 6px 14px rgba(0,0,0,0.12);
      padding:10px;
      overflow:hidden;
      cursor:pointer;
    }

    .icon{
      font-size:clamp(64px,18vw,100px);
      line-height:1;
      margin-bottom:8px;
    }

    .menuText{
      text-align:center;
      line-height:1.2;
      word-break:break-word;
    }

    .listBtn{
      width:100%;
      margin-top:16px;
      padding:clamp(18px,5vw,26px);
      border:none;
      border-radius:22px;
      background:#2d3748;
      color:white;
      font-size:clamp(22px,5.5vw,30px);
      font-weight:bold;
      line-height:1.35;
      box-shadow:0 6px 14px rgba(0,0,0,0.18);
      cursor:pointer;
    }

    #formAlani{
      display:none;
      width:100%;
      margin-top:22px;
      background:white;
      padding:clamp(18px,4vw,24px);
      border-radius:22px;
      text-align:left;
      box-shadow:0 6px 16px rgba(0,0,0,0.10);
      overflow:hidden;
    }

    .formTitle{
      font-size:clamp(24px,6vw,30px);
      font-weight:bold;
      margin-bottom:18px;
      text-align:center;
      color:#222;
    }

    .formLabel{
      display:block;
      font-size:clamp(18px,4.8vw,22px);
      font-weight:bold;
      margin:16px 0 8px 0;
      color:#333;
    }

    input, textarea{
      width:100%;
      max-width:100%;
      padding:16px;
      font-size:16px;
      border:1px solid #ccc;
      border-radius:14px;
      background:white;
      appearance:none;
      -webkit-appearance:none;
    }

    textarea{
      min-height:120px;
      resize:vertical;
    }

    input::placeholder, textarea::placeholder{
      font-size:16px;
      color:#999;
    }

    .actionBtn{
      width:100%;
      padding:18px;
      margin-top:18px;
      font-size:clamp(22px,5vw,28px);
      border:none;
      border-radius:14px;
      background:#111;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .dangerBtn{
      background:#991b1b;
    }

    .secondaryBtn{
      background:#444;
    }

    .blueBtn{
      background:#0b57d0;
    }

    .greenBtn{
      background:#047857;
    }

    .grayBtn{
      background:#6b7280;
    }

    .mesajKutusu{
      display:none;
      margin-top:18px;
      padding:16px 18px;
      border-radius:14px;
      font-size:clamp(18px,4.6vw,22px);
      font-weight:bold;
      text-align:left;
      line-height:1.5;
      word-break:break-word;
    }

    .mesaj-success{
      display:block;
      background:#d1fae5;
      color:#065f46;
      border:1px solid #86efac;
    }

    .mesaj-error{
      display:block;
      background:#fee2e2;
      color:#991b1b;
      border:1px solid #fca5a5;
    }

    .mesaj-warn{
      display:block;
      background:#ffedd5;
      color:#9a3412;
      border:1px solid #fdba74;
    }

    .kitapKart{
      margin-top:18px;
      background:#fff7ed;
      border:2px solid #fdba74;
      border-radius:16px;
      padding:18px;
      overflow:hidden;
    }

    .kitapBaslik{
      font-size:clamp(22px,5.2vw,26px);
      font-weight:bold;
      color:#222;
      margin-bottom:10px;
      word-break:break-word;
    }

    .kitapSatir{
      font-size:clamp(17px,4.4vw,21px);
      color:#444;
      margin:6px 0;
      line-height:1.4;
      word-break:break-word;
    }

    .durumBadge{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      font-size:clamp(15px,4vw,18px);
      font-weight:bold;
      margin-top:8px;
    }

    .rafta{
      background:#d1fae5;
      color:#065f46;
    }

    .oduncte{
      background:#fee2e2;
      color:#991b1b;
    }

    .scannerWrap{
      display:none;
      margin-top:16px;
      border-radius:18px;
      overflow:hidden;
      background:#111;
      padding:10px;
    }

    #reader{
      width:100%;
      min-height:260px;
      border-radius:12px;
      overflow:hidden;
      background:#000;
    }

    .scanHelp{
      margin-top:10px;
      color:#fff;
      background:rgba(255,255,255,0.08);
      padding:10px 12px;
      border-radius:12px;
      font-size:14px;
      line-height:1.4;
    }

    .miniButtons{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:12px;
    }

    .topActions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }

    .linkLike{
      display:block;
      width:100%;
      text-decoration:none;
    }

    @media (max-width:640px){
      .miniButtons{
        grid-template-columns:1fr;
      }
      .topActions{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">📚 Kütüphane Takip</div>
    <div id="subInfo" class="subInfo">Cloudflare Worker + D1 aktif</div>

    <div class="grid">
      <button class="menuBtn" onclick="ekleForm()">
        <div class="icon">➕</div>
        <div class="menuText">Kitap Ekle</div>
      </button>

      <button class="menuBtn" onclick="oduncVerForm()">
        <div class="icon">📤</div>
        <div class="menuText">Ödünç Ver</div>
      </button>

      <button class="menuBtn" onclick="iadeForm()">
        <div class="icon">📥</div>
        <div class="menuText">İade Al</div>
      </button>

      <button class="menuBtn" onclick="silForm()">
        <div class="icon">🗑️</div>
        <div class="menuText">Kitap Sil</div>
      </button>
    </div>

    <a class="linkLike" href="./liste.html?v=20">
      <button class="listBtn">📚<br>Kitap Listesi</button>
    </a>

    <div id="formAlani"></div>
  </div>

  <script>
    const API_URL = 'https://little-heart-9411.sedasahingultekin.workers.dev';

    let qr = null;
    let aktifMod = '';
    let seciliKitap = null;
    let sonOkunan = '';

    function guvenliYazi(deger) {
      return String(deger || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function temizIsbn(deger) {
      return String(deger || '').toUpperCase().replace(/[^0-9X]/g, '').trim();
    }

    function aktifMesajTemizle() {
      const kutu = document.getElementById('mesajKutusu');
      if (kutu) {
        kutu.className = 'mesajKutusu';
        kutu.innerHTML = '';
      }
    }

    function mesajGoster(mesaj, tip = 'success') {
      const kutu = document.getElementById('mesajKutusu');
      if (!kutu) return;
      kutu.className = 'mesajKutusu mesaj-' + tip;
      kutu.innerHTML = guvenliYazi(mesaj);
      setTimeout(() => {
        kutu.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 100);
    }

    function klavyeyiKapat() {
      if (document.activeElement) {
        document.activeElement.blur();
      }
    }

    async function apiPost(payload) {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      return await response.json();
    }

    async function kameraKapat() {
      try {
        sonOkunan = '';
        if (qr) {
          try { await qr.stop(); } catch (e) {}
          try { await qr.clear(); } catch (e) {}
          qr = null;
        }

        const wrap = document.getElementById('scannerWrap');
        const reader = document.getElementById('reader');
        if (wrap) wrap.style.display = 'none';
        if (reader) reader.innerHTML = '';
      } catch (err) {}
    }

    function formGoster(html) {
      kameraKapat();
      seciliKitap = null;
      const alan = document.getElementById('formAlani');
      alan.style.display = 'block';
      alan.innerHTML = html + `<div id="mesajKutusu" class="mesajKutusu"></div>`;
      setTimeout(() => {
        alan.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }

    function kitapKartHtml(kitap) {
      const durum = String(kitap.durum || 'RAFTA').toUpperCase();
      const badgeClass = durum === 'ÖDÜNÇTE' ? 'oduncte' : 'rafta';

      return `
        <div class="kitapKart">
          <div class="kitapBaslik">${guvenliYazi(kitap.kitapAdi || '-')}</div>
          <div class="kitapSatir"><strong>Yazar:</strong> ${guvenliYazi(kitap.yazar || '-')}</div>
          <div class="kitapSatir"><strong>ISBN:</strong> ${guvenliYazi(kitap.isbn || '-')}</div>
          <div class="kitapSatir"><strong>Yayınevi:</strong> ${guvenliYazi(kitap.yayinevi || '-')}</div>
          <div class="kitapSatir"><strong>Yıl:</strong> ${guvenliYazi(kitap.yayinYili || '-')}</div>
          <div class="kitapSatir"><strong>Ödünç Alan:</strong> ${guvenliYazi(kitap.oduncAlan || '-')}</div>
          <div class="kitapSatir"><strong>Ödünç Tarihi:</strong> ${guvenliYazi(kitap.oduncTarihi || '-')}</div>
          <div class="kitapSatir"><strong>İade Tarihi:</strong> ${guvenliYazi(kitap.iadeTarihi || '-')}</div>
          <div class="durumBadge ${badgeClass}">${guvenliYazi(durum)}</div>
        </div>
      `;
    }

    async function tumKitaplariGetir() {
      const sonuc = await apiPost({ action: 'booksList' });
      if (!sonuc.ok) {
        throw new Error(sonuc.error || 'Kitap listesi alınamadı');
      }
      return sonuc.data || [];
    }

    async function kamerayiBaslat(mod) {
      aktifMesajTemizle();
      klavyeyiKapat();
      await kameraKapat();

      aktifMod = mod;

      if (typeof Html5Qrcode === 'undefined') {
        mesajGoster('html5-qrcode yüklenemedi', 'error');
        return;
      }

      const wrap = document.getElementById('scannerWrap');
      const reader = document.getElementById('reader');

      try {
        wrap.style.display = 'block';
        reader.innerHTML = '';
        qr = new Html5Qrcode('reader');
        sonOkunan = '';

        await qr.start(
          { facingMode: 'environment' },
          {
            fps: 10,
            qrbox: { width: 250, height: 120 }
          },
          async (decodedText) => {
            const isbn = temizIsbn(decodedText);
            if (!isbn) return;
            if (isbn === sonOkunan) return;

            sonOkunan = isbn;

            if (aktifMod === 'ekle') {
              document.getElementById('isbn').value = isbn;
              mesajGoster('ISBN okundu: ' + isbn, 'success');
              await kameraKapat();
              await isbnBilgisiGetir();
            }

            if (aktifMod === 'odunc') {
              document.getElementById('oduncIsbn').value = isbn;
              mesajGoster('ISBN okundu: ' + isbn, 'success');
              await kameraKapat();
              await oduncKitapBul();
            }

            if (aktifMod === 'iade') {
              document.getElementById('iadeIsbn').value = isbn;
              mesajGoster('ISBN okundu: ' + isbn, 'success');
              await kameraKapat();
              await iadeKitapBul();
            }

            if (aktifMod === 'sil') {
              document.getElementById('silIsbn').value = isbn;
              mesajGoster('ISBN okundu: ' + isbn, 'success');
              await kameraKapat();
              await silKitapBul();
            }
          }
        );
      } catch (err) {
        await kameraKapat();
        mesajGoster('Kamera açılamadı: ' + (err.message || err), 'error');
      }
    }

    function ekleForm() {
      formGoster(`
        <div class="formTitle">➕ Kitap Ekle</div>

        <div class="topActions">
          <button class="actionBtn blueBtn" onclick="kamerayiBaslat('ekle')">📷 Kamera ile ISBN Okut</button>
          <button class="actionBtn grayBtn" onclick="kameraKapat()">Kamerayı Kapat</button>
        </div>

        <div id="scannerWrap" class="scannerWrap">
          <div id="reader"></div>
          <div class="scanHelp">Barkodu kutuya ortalayın</div>
        </div>

        <label class="formLabel">ISBN</label>
        <input type="text" id="isbn" placeholder="ISBN yazın veya okutun">

        <button class="actionBtn secondaryBtn" onclick="isbnBilgisiGetir()">ISBN'den Doldur</button>

        <div id="ekleKitapAlani"></div>

        <label class="formLabel">Kitap Adı</label>
        <input type="text" id="kitapAdi" placeholder="Kitap adı">

        <label class="formLabel">Yazar</label>
        <input type="text" id="yazar" placeholder="Yazar">

        <label class="formLabel">Yayınevi</label>
        <input type="text" id="yayinevi" placeholder="Yayınevi">

        <label class="formLabel">Yayın Yılı</label>
        <input type="text" id="yayinYili" placeholder="Örn: 2024">

        <label class="formLabel">Not</label>
        <textarea id="notText" placeholder="İsteğe bağlı not"></textarea>

        <button class="actionBtn greenBtn" onclick="kitapEkle()">Kaydet</button>
      `);
    }

    async function isbnBilgisiGetir() {
      aktifMesajTemizle();

      const isbn = temizIsbn(document.getElementById('isbn').value);
      if (!isbn) {
        mesajGoster('Önce ISBN girin veya okutun', 'warn');
        return;
      }

      try {
        const sonuc = await apiPost({
          action: 'isbnLookup',
          isbn
        });

        if (!sonuc.ok) {
          mesajGoster(sonuc.error || 'Sorgu hatası', 'error');
          return;
        }

        const data = sonuc.data || {};
        document.getElementById('ekleKitapAlani').innerHTML = '';

        if (!data.bulundu) {
          mesajGoster(data.mesaj || 'Kitap bilgisi bulunamadı', 'warn');
          return;
        }

        document.getElementById('isbn').value = data.isbn || '';
        document.getElementById('kitapAdi').value = data.kitapAdi || '';
        document.getElementById('yazar').value = data.yazar || '';
        document.getElementById('yayinevi').value = data.yayinevi || '';
        document.getElementById('yayinYili').value = data.yayinYili || '';

        document.getElementById('ekleKitapAlani').innerHTML = `
          <div class="kitapKart">
            <div class="kitapBaslik">${guvenliYazi(data.kitapAdi || '-')}</div>
            <div class="kitapSatir"><strong>Yazar:</strong> ${guvenliYazi(data.yazar || '-')}</div>
            <div class="kitapSatir"><strong>Yayınevi:</strong> ${guvenliYazi(data.yayinevi || '-')}</div>
            <div class="kitapSatir"><strong>Yıl:</strong> ${guvenliYazi(data.yayinYili || '-')}</div>
            <div class="kitapSatir"><strong>ISBN:</strong> ${guvenliYazi(data.isbn || '-')}</div>
          </div>
        `;

        if (data.zatenKayitli && data.mevcutKayit) {
          mesajGoster('Bu ISBN sistemde zaten kayıtlı', 'error');
        } else {
          mesajGoster('Kitap bilgisi dolduruldu', 'success');
        }
      } catch (err) {
        mesajGoster('Sorgu hatası: ' + err.message, 'error');
      }
    }

    async function kitapEkle() {
      aktifMesajTemizle();

      const payload = {
        action: 'bookAdd',
        isbn: temizIsbn(document.getElementById('isbn').value),
        kitapAdi: (document.getElementById('kitapAdi').value || '').trim(),
        yazar: (document.getElementById('yazar').value || '').trim(),
        yayinevi: (document.getElementById('yayinevi').value || '').trim(),
        yayinYili: (document.getElementById('yayinYili').value || '').trim(),
        notText: (document.getElementById('notText').value || '').trim()
      };

      if (!payload.kitapAdi || !payload.yazar) {
        mesajGoster('Kitap adı ve yazar zorunlu', 'warn');
        return;
      }

      try {
        const sonuc = await apiPost(payload);

        if (!sonuc.ok) {
          mesajGoster(sonuc.error || 'Kayıt hatası', 'error');
          return;
        }

        const mesaj = String(sonuc.message || '');
        if (mesaj.toLowerCase().includes('zaten')) {
          mesajGoster(mesaj, 'error');
          return;
        }

        mesajGoster(mesaj || 'Kitap kaydedildi', 'success');

        document.getElementById('isbn').value = '';
        document.getElementById('kitapAdi').value = '';
        document.getElementById('yazar').value = '';
        document.getElementById('yayinevi').value = '';
        document.getElementById('yayinYili').value = '';
        document.getElementById('notText').value = '';
        document.getElementById('ekleKitapAlani').innerHTML = '';
      } catch (err) {
        mesajGoster('Kayıt hatası: ' + err.message, 'error');
      }
    }

    function oduncVerForm() {
      formGoster(`
        <div class="formTitle">📤 Ödünç Ver</div>

        <div class="topActions">
          <button class="actionBtn blueBtn" onclick="kamerayiBaslat('odunc')">📷 Kamera ile ISBN Okut</button>
          <button class="actionBtn grayBtn" onclick="kameraKapat()">Kamerayı Kapat</button>
        </div>

        <div id="scannerWrap" class="scannerWrap">
          <div id="reader"></div>
          <div class="scanHelp">Barkodu kutuya ortalayın</div>
        </div>

        <label class="formLabel">ISBN</label>
        <input type="text" id="oduncIsbn" placeholder="ISBN yazın veya okutun">

        <button class="actionBtn secondaryBtn" onclick="oduncKitapBul()">Kitabı Bul</button>

        <div id="oduncKitapAlani"></div>

        <label class="formLabel">Kime Verildi</label>
        <input type="text" id="oduncAlan" placeholder="Ad Soyad">

        <button class="actionBtn greenBtn" onclick="oduncVer()">Ödünç Ver</button>
      `);
    }

    async function oduncKitapBul() {
      aktifMesajTemizle();
      seciliKitap = null;
      document.getElementById('oduncKitapAlani').innerHTML = '';

      try {
        const isbn = temizIsbn(document.getElementById('oduncIsbn').value);
        if (!isbn) {
          mesajGoster('Önce ISBN girin veya okutun', 'warn');
          return;
        }

        const kitaplar = await tumKitaplariGetir();
        const kitap = kitaplar.find(k => temizIsbn(k.isbn || '') === isbn);

        if (!kitap) {
          mesajGoster('Bu ISBN ile kayıtlı kitap bulunamadı', 'warn');
          return;
        }

        seciliKitap = kitap;
        document.getElementById('oduncKitapAlani').innerHTML = kitapKartHtml(kitap);

        if (String(kitap.durum || '').toUpperCase() === 'ÖDÜNÇTE') {
          mesajGoster('Bu kitap zaten ödünçte', 'error');
        } else {
          mesajGoster('Kitap bulundu', 'success');
        }
      } catch (err) {
        mesajGoster('Arama hatası: ' + err.message, 'error');
      }
    }

    async function oduncVer() {
      aktifMesajTemizle();

      if (!seciliKitap) {
        mesajGoster('Önce kitabı bulun', 'warn');
        return;
      }

      if (String(seciliKitap.durum || '').toUpperCase() === 'ÖDÜNÇTE') {
        mesajGoster('Bu kitap zaten ödünçte', 'error');
        return;
      }

      const borrower = (document.getElementById('oduncAlan').value || '').trim();
      if (!borrower) {
        mesajGoster('Kişi adı zorunlu', 'warn');
        return;
      }

      try {
        const sonuc = await apiPost({
          action: 'loanBook',
          id: seciliKitap.id,
          borrower
        });

        if (!sonuc.ok) {
          mesajGoster(sonuc.error || 'Ödünç verme hatası', 'error');
          return;
        }

        mesajGoster(sonuc.message || 'Kitap ödünç verildi', 'success');
        document.getElementById('oduncAlan').value = '';
        await oduncKitapBul();
      } catch (err) {
        mesajGoster('Ödünç verme hatası: ' + err.message, 'error');
      }
    }

    function iadeForm() {
      formGoster(`
        <div class="formTitle">📥 İade Al</div>

        <div class="topActions">
          <button class="actionBtn blueBtn" onclick="kamerayiBaslat('iade')">📷 Kamera ile ISBN Okut</button>
          <button class="actionBtn grayBtn" onclick="kameraKapat()">Kamerayı Kapat</button>
        </div>

        <div id="scannerWrap" class="scannerWrap">
          <div id="reader"></div>
          <div class="scanHelp">Barkodu kutuya ortalayın</div>
        </div>

        <label class="formLabel">ISBN</label>
        <input type="text" id="iadeIsbn" placeholder="ISBN yazın veya okutun">

        <button class="actionBtn secondaryBtn" onclick="iadeKitapBul()">Kitabı Bul</button>

        <div id="iadeKitapAlani"></div>

        <button class="actionBtn greenBtn" onclick="iadeAl()">İade Al</button>
      `);
    }

    async function iadeKitapBul() {
      aktifMesajTemizle();
      seciliKitap = null;
      document.getElementById('iadeKitapAlani').innerHTML = '';

      try {
        const isbn = temizIsbn(document.getElementById('iadeIsbn').value);
        if (!isbn) {
          mesajGoster('Önce ISBN girin veya okutun', 'warn');
          return;
        }

        const kitaplar = await tumKitaplariGetir();
        const kitap = kitaplar.find(k => temizIsbn(k.isbn || '') === isbn);

        if (!kitap) {
          mesajGoster('Bu ISBN ile kayıtlı kitap bulunamadı', 'warn');
          return;
        }

        seciliKitap = kitap;
        document.getElementById('iadeKitapAlani').innerHTML = kitapKartHtml(kitap);

        if (String(kitap.durum || '').toUpperCase() !== 'ÖDÜNÇTE') {
          mesajGoster('Bu kitap zaten rafta', 'warn');
        } else {
          mesajGoster('Kitap bulundu', 'success');
        }
      } catch (err) {
        mesajGoster('Arama hatası: ' + err.message, 'error');
      }
    }

    async function iadeAl() {
      aktifMesajTemizle();

      if (!seciliKitap) {
        mesajGoster('Önce kitabı bulun', 'warn');
        return;
      }

      if (String(seciliKitap.durum || '').toUpperCase() !== 'ÖDÜNÇTE') {
        mesajGoster('Bu kitap zaten rafta', 'warn');
        return;
      }

      try {
        const sonuc = await apiPost({
          action: 'returnBook',
          id: seciliKitap.id
        });

        if (!sonuc.ok) {
          mesajGoster(sonuc.error || 'İade alma hatası', 'error');
          return;
        }

        mesajGoster(sonuc.message || 'Kitap iade alındı', 'success');
        await iadeKitapBul();
      } catch (err) {
        mesajGoster('İade alma hatası: ' + err.message, 'error');
      }
    }

    function silForm() {
      formGoster(`
        <div class="formTitle">🗑️ Kitap Sil</div>

        <div class="topActions">
          <button class="actionBtn blueBtn" onclick="kamerayiBaslat('sil')">📷 Kamera ile ISBN Okut</button>
          <button class="actionBtn grayBtn" onclick="kameraKapat()">Kamerayı Kapat</button>
        </div>

        <div id="scannerWrap" class="scannerWrap">
          <div id="reader"></div>
          <div class="scanHelp">Barkodu kutuya ortalayın</div>
        </div>

        <label class="formLabel">ISBN</label>
        <input type="text" id="silIsbn" placeholder="ISBN yazın veya okutun">

        <button class="actionBtn secondaryBtn" onclick="silKitapBul()">Kitabı Bul</button>

        <div id="silKitapAlani"></div>

        <button class="actionBtn dangerBtn" onclick="kitapSil()">Kalıcı Olarak Sil</button>
      `);
    }

    async function silKitapBul() {
      aktifMesajTemizle();
      seciliKitap = null;
      document.getElementById('silKitapAlani').innerHTML = '';

      try {
        const isbn = temizIsbn(document.getElementById('silIsbn').value);
        if (!isbn) {
          mesajGoster('Önce ISBN girin veya okutun', 'warn');
          return;
        }

        const kitaplar = await tumKitaplariGetir();
        const kitap = kitaplar.find(k => temizIsbn(k.isbn || '') === isbn);

        if (!kitap) {
          mesajGoster('Bu ISBN ile kayıtlı kitap bulunamadı', 'warn');
          return;
        }

        seciliKitap = kitap;
        document.getElementById('silKitapAlani').innerHTML = kitapKartHtml(kitap);

        if (String(kitap.durum || '').toUpperCase() === 'ÖDÜNÇTE') {
          mesajGoster('Ödünçte olan kitap silinemez', 'error');
        } else {
          mesajGoster('Kitap bulundu', 'success');
        }
      } catch (err) {
        mesajGoster('Arama hatası: ' + err.message, 'error');
      }
    }

    async function kitapSil() {
      aktifMesajTemizle();

      if (!seciliKitap) {
        mesajGoster('Önce kitabı bulun', 'warn');
        return;
      }

      if (String(seciliKitap.durum || '').toUpperCase() === 'ÖDÜNÇTE') {
        mesajGoster('Ödünçte olan kitap silinemez', 'error');
        return;
      }

      const onay = confirm('Bu kitabı kalıcı olarak silmek istiyor musun?');
      if (!onay) return;

      try {
        if (!seciliKitap.isbn) {
          mesajGoster('Silme için ISBN bulunamadı', 'error');
          return;
        }

        const sonuc = await apiPost({
          action: 'deleteByIsbn',
          isbn: seciliKitap.isbn
        });

        if (!sonuc.ok) {
          mesajGoster(sonuc.error || 'Silme hatası', 'error');
          return;
        }

        mesajGoster(sonuc.message || 'Kitap silindi', 'success');
        document.getElementById('silIsbn').value = '';
        document.getElementById('silKitapAlani').innerHTML = '';
        seciliKitap = null;
      } catch (err) {
        mesajGoster('Silme hatası: ' + err.message, 'error');
      }
    }
  </script>
</body>
</html>
