<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Kütüphane Takip</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html, body{
      width:100%;
      max-width:100%;
      overflow-x:hidden;
      font-family:Arial,sans-serif;
      background:linear-gradient(180deg,#f7f7f7 0%,#ececec 100%);
    }

    body{
      padding:14px;
    }

    .app{
      width:100%;
      max-width:100vw;
      margin:0 auto;
    }

    .header{
      background:#F28400;
      color:white;
      padding:20px;
      border-radius:20px;
      font-size:28px;
      font-weight:bold;
      margin-bottom:14px;
      text-align:center;
      box-shadow:0 6px 14px rgba(0,0,0,0.15);
    }

    .subInfo{
      background:#fff;
      border-radius:14px;
      padding:12px 14px;
      margin-bottom:18px;
      font-size:16px;
      color:#444;
    }

    .grid{
      width:100%;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }

    .menuBtn{
      width:100%;
      aspect-ratio:1/1;
      border:none;
      border-radius:22px;
      background:white;
      color:#333;
      font-size:22px;
      font-weight:bold;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      box-shadow:0 6px 14px rgba(0,0,0,0.12);
      cursor:pointer;
    }

    .icon{
      font-size:80px;
      margin-bottom:8px;
    }

    .listBtn{
      width:100%;
      margin-top:16px;
      padding:24px;
      border:none;
      border-radius:22px;
      background:#2d3748;
      color:white;
      font-size:28px;
      font-weight:bold;
      cursor:pointer;
    }

    .linkLike{
      display:block;
      width:100%;
      text-decoration:none;
    }

    #formAlani{
      margin-top:18px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">📚 Kütüphane Takip</div>
    <div class="subInfo">Modüler JS altyapısı aktif</div>

    <div class="grid">
      <button class="menuBtn" onclick="ekleForm()">
        <div class="icon">➕</div>
        <div>Kitap Ekle</div>
      </button>

      <button class="menuBtn">
        <div class="icon">📤</div>
        <div>Ödünç Ver</div>
      </button>

      <button class="menuBtn">
        <div class="icon">📥</div>
        <div>İade Al</div>
      </button>

      <button class="menuBtn">
        <div class="icon">🗑️</div>
        <div>Kitap Sil</div>
      </button>
    </div>

    <a class="linkLike" href="./liste.html?v=20">
      <button class="listBtn">📚<br>Kitap Listesi</button>
    </a>

    <div id="formAlani"></div>
  </div>

  <script src="./js/api.js"></script>
  <script src="./js/ekle.js"></script>
</body>
</html>
